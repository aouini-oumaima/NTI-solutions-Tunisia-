name: Deploy NTI Solutions to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

# Grant write permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deploys — only one at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nti-solutions/package-lock.json

      - name: Install dependencies
        working-directory: nti-solutions
        run: npm ci

      - name: Build Next.js static site
        working-directory: nti-solutions
        run: npm run build
        # GITHUB_ACTIONS=true is automatically set by the runner — next.config.ts uses it
        # to enable the basePath (/NTI-solutions-Tunisia-)

      - name: Add .nojekyll (prevents Jekyll from reprocessing Next.js output)
        run: touch nti-solutions/out/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload static output as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nti-solutions/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
